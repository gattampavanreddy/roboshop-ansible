- name: mongodb configure
  hosts: mongodb
  become: true
  tasks:
    - name: copy mongodb repo file
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo 

    - name: install mongodb server
      ansible.builtin.dnf:
        name: mongodb-org
        state: present  

    - name: allow remote connections to mongodb #replace the bindIp value in mongod.conf file to allow remote connections
      ansible.builtin.replace:
        path: /etc/mongod.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'

    - name: start and enable mongodb service #service module is used to start and enable the service
      ansible.builtin.service:
         name: mongod 
         enabled: yes
         state: started

    # - name: restart mongodb service      
    #   ansible.builtin.service:
    #      name: mongod
    #      state: restarted